name: Daily IG digest

on:
  schedule:
    - cron: "0 1 * * *"        # 每天 01:00 UTC = 曼谷時間 08:00（UTC+7）
  workflow_dispatch:            # 也可在 Actions 頁面手動觸發

permissions:
  contents: write               # 允許把抓到的結果 commit 回 repo
  models: read                  # 允許免費使用 GitHub Models 做摘要

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 檢查新貼文
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node src/check.js

      - name: Commit 結果
        run: |
          git config user.name "ig-monitor-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "沒有變更，略過 commit"
          else
            git commit -m "chore: IG 每日彙整 $(date -u +%F)"
            git push
          fi
