name: Re-summarize (補摘要)

# 一次性手動工具：用已存下來的文字重做摘要（不重抓 IG）。
# 設好 GEMINI_API_KEY 後，到 Actions → Re-summarize → Run workflow 即可。
on:
  workflow_dispatch:

permissions:
  contents: write
  models: read

jobs:
  resummarize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 補摘要
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node src/resummarize.js

      - name: Commit 結果
        run: |
          git config user.name "ig-monitor-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "沒有變更，略過 commit"
          else
            git commit -m "chore: 補上 AI 摘要 $(date -u +%F)"
            git push
          fi
